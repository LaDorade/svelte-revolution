services:
    sveltekit:
        build: .
        container_name: sveltekit_c
        ports:
            - '8080:8080'

    pocketbase:
        build: ./db
        restart: unless-stopped
        container_name: pocketbase_c
        ports:
            - 8090:8090
        volumes:
            - pocketbase-data:/pb_data
            - pocketbase-migration:/pb_migrations

    iaserver:
        build: ./ia_server
        container_name: iaserver_c
        ports:
            - 8000:8000
        volumes:
            - ia-server-data:/data

volumes:
    pocketbase-data:
    pocketbase-migration:
    ia-server-data:
