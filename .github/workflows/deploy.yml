name: Deploy to Server

on:
    push:
        branches:
            - staging

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Setup SSH
              uses: webfactory/ssh-agent@v0.5.3
              with:
                  ssh-private-key: ${{ secrets.SSH_KEY }}

            - name: Copy project files to server
              env:
                  SERVER_IP: ${{ secrets.SERVER_IP }}
                  USERNAME: ${{ secrets.USERNAME }}
              run: |
                  rsync -avz -e "ssh -o StrictHostKeyChecking=no" --exclude '.git' ./ $USERNAME@$SERVER_IP:~/app/

            - name: Deploy on server
              env:
                  SERVER_IP: ${{ secrets.SERVER_IP }}
                  USERNAME: ${{ secrets.USERNAME }}
              run: |
                  ssh -o StrictHostKeyChecking=no $USERNAME@$SERVER_IP << 'EOF'
                    cd ./app
                    echo "ENV_FILE=.env.production" >> .env
                    rm -rf .env.production
                    echo "DB_URL=http://pocketbase:8090" >> .env.production
                    echo "PUBLIC_DB_URL=https://new-db.babel-revolution.fr" >> .env.production
                    echo "IA_SERVER_URL=http://iaserver:8000" >> .env.production
                    echo "ORIGIN=https://new.babel-revolution.fr" >> .env.production
                    docker-compose down
                    docker-compose up -d --build
                  EOF
