name: Deploy to Server

on:
    push:
        branches:
            - staging

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Setup SSH
              uses: webfactory/ssh-agent@v0.5.3
              with:
                  ssh-private-key: ${{ secrets.SSH_KEY }}

            - name: Copy project files to server
              env:
                  SERVER_IP: ${{ secrets.SERVER_IP }}
                  USERNAME: ${{ secrets.USERNAME }}
              run: |
                  rsync -avz -e "ssh -o StrictHostKeyChecking=no" --exclude '.git' ./ $USERNAME@$SERVER_IP:~/app/

            - name: Deploy on server
              env:
                  SERVER_IP: ${{ secrets.SERVER_IP }}
                  USERNAME: ${{ secrets.USERNAME }}
              run: |
                  ssh -o StrictHostKeyChecking=no $USERNAME@$SERVER_IP << 'EOF'
                  cd ./app
                  docker-compose down
                  docker-compose up -d --build
                  EOF

            - name: Notify on Discord Webhook (Success)
              if: success()
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
              run: |
                  curl -X POST -H 'Content-type: application/json' --data '{"content": "Deployment to staging server is successful!"}' $DISCORD_WEBHOOK_URL

            - name: Notify on Discord Webhook (Failure)
              if: failure()
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
              run: |
                  ERROR_MESSAGE=$(cat $GITHUB_WORKSPACE/deploy.log)
                  curl -X POST -H 'Content-type: application/json' --data "{\"embeds\": [{\"title\": \"Deployment Failed\", \"description\": \"\`\`\`${ERROR_MESSAGE}\`\`\`\", \"color\": 15158332}]}" $DISCORD_WEBHOOK_URL
