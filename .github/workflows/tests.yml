name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
      PATH: ${{ github.workspace }}/.bun/bin:${{ env.PATH }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Bun
      run: |
        curl -fsSL https://bun.sh/install | bash

    - name: Install dependencies
      run: bun install

    - name: Run tests
      run: bun test