name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Bun
      run: npm install -g bun

    - name: Install dependencies
      run: bun install

    - name: Run tests
      run: bun test