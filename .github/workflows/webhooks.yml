name: Notify Discord on Staging Push

on:
    push:
        branches:
            - staging

jobs:
    notify:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Notify on Discord Webhook
              env:
                  BABEL_DISCORD_WEBHOOK_URL: ${{ secrets.BABEL_DISCORD_WEBHOOK_URL }}
              run: |
                  COMMITS=$(git log origin/staging --not --remotes=origin --pretty=format:'- %s (%an)')
                  curl -X POST -H 'Content-type: application/json' --data "{\"embeds\": [{\"title\": \"New commits pushed to staging branch\", \"description\": \"$COMMITS\", \"color\": 5814783}]}" $BABEL_DISCORD_WEBHOOK_URL
